version: '3.8'

services:
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: tenant-rag-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tenant_rag_db
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenant_rag_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
